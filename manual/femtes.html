<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Manual Femtes - PAC Suite</title>

  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/manual.css" />
</head>

<body>

  <div id="site-header"></div>

  <header class="hero">
    <h1 data-i18n="manual.femtes.title"></h1>
    <p data-i18n="manual.femtes.subtitle"></p>
  </header>

  <main class="manual-container">

    <a class="back-link" href="index.html" data-preserve-lang data-i18n="manual.back"></a>

    <section class="card">
      <h2 data-i18n="manual.common.register_title"></h2>

      <ul>
        <li data-i18n="manual.femtes.reg1"></li>
        <li data-i18n="manual.femtes.reg2"></li>
        <li data-i18n="manual.femtes.reg3"></li>
        <li data-i18n="manual.femtes.reg4"></li>
      </ul>
    </section>

    <section class="card">
      <h2 data-i18n="manual.common.basic_title"></h2>

      <ol>
        <li data-i18n="manual.femtes.basic1"></li>
        <li data-i18n="manual.femtes.basic2"></li>
        <li data-i18n="manual.femtes.basic3"></li>
        <li data-i18n="manual.femtes.basic4"></li>
      </ol>
    </section>

    <section class="card">
      <h2 data-i18n="manual.femtes.charts_title"></h2>

      <p data-i18n="manual.femtes.chart_p1"></p>

      <p data-i18n="manual.femtes.chart_p2"></p>
    </section>

    <section class="card">
      <h2 data-i18n="manual.common.privacy_title"></h2>

      <p data-i18n="manual.femtes.privacy_p"></p>
    </section>

  </main>

  <script src="../assets/js/i18n.js"></script>
  <script src="../assets/js/layout.js"></script>
  <script>
    renderLayout({
      active: "manual",
      basePath: "..",
      subtitleKey: "manual.title",
      showNav: false,
      showLanguageSelector: false
    });

    const lang = new URLSearchParams(window.location.search).get("lang");
    if (lang) {
      document.documentElement.lang = lang;
      document.querySelectorAll("[data-preserve-lang]").forEach((link) => {
        const url = new URL(link.getAttribute("href"), window.location.href);
        url.searchParams.set("lang", lang);
        link.href = url.pathname.split("/").pop() + url.search;
      });
    }
  </script>
</body>
</html>
